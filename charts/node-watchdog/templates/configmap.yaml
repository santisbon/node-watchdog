apiVersion: v1
kind: ConfigMap
metadata:
  name: node-watchdog-script
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-watchdog.labels" . | nindent 4 }}
data:
  watchdog.sh: |
    #!/bin/bash
    set -uo pipefail

    KUBECTL=/shared/kubectl
    POOL={{ .Values.cephPool }}

    log() { echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $*"; }

    log "Watchdog run starting"

    NOTREADY_NODES=$($KUBECTL get nodes --no-headers | awk '$2 == "NotReady" {print $1}')

    if [ -z "$NOTREADY_NODES" ]; then
      log "All nodes Ready — exiting"
      exit 0
    fi

    for NODE in $NOTREADY_NODES; do
      NODE_IP=$($KUBECTL get node "$NODE" \
        -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}')

      log "Node $NODE ($NODE_IP) is NotReady — starting recovery"

      # Force-delete pods stuck in Terminating on the dead node
      $KUBECTL get pods --all-namespaces \
        --field-selector="spec.nodeName=$NODE" -o json \
        | python3 -c "
    import json, sys
    for p in json.load(sys.stdin)['items']:
        if p.get('metadata', {}).get('deletionTimestamp'):
            print(p['metadata']['namespace'] + '/' + p['metadata']['name'])
    " | while IFS='/' read -r NS POD; do
          log "Force-deleting stuck pod $NS/$POD"
          $KUBECTL delete pod "$POD" -n "$NS" --force --grace-period=0 2>/dev/null || true
        done

      # Blocklist any Ceph clients with open watchers on RBD images from the dead node
      for VOL in $(rbd ls "$POOL" 2>/dev/null); do
        WATCHER=$(rbd status "$POOL/$VOL" 2>/dev/null \
          | awk -v ip="$NODE_IP" \
              '$0 ~ "watcher="ip":" { sub(/.*watcher=/, ""); sub(/ .*/, ""); print }')
        if [ -n "$WATCHER" ]; then
          log "Blocklisting $WATCHER (held lock on $VOL)"
          ceph osd blocklist add "$WATCHER" \
            || log "WARNING: blocklist failed for $WATCHER"
        fi
      done

      log "Recovery complete for $NODE"
    done

    log "Watchdog run complete"

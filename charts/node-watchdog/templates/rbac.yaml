apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  # Namespace-scoped name avoids conflicts if the chart is installed
  # in multiple namespaces on the same cluster.
  name: node-watchdog-{{ .Release.Namespace }}
  labels:
    {{- include "node-watchdog.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-watchdog-{{ .Release.Namespace }}
  labels:
    {{- include "node-watchdog.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-watchdog-{{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: node-watchdog
    namespace: {{ .Release.Namespace }}

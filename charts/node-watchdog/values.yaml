# Hostname of any node in the MicroCeph cluster. Used only by the keyring init
# hook Job during helm install and helm upgrade to read the Ceph config from
# the host filesystem.
cephNode: node-01

# Node the watchdog CronJob's pod should preferentially be scheduled on.
# Left empty to disable and let the scheduler place it anywhere.
#
# Default it to the cluster's control-plane node: if that node is ever down,
# the API server is unreachable and nothing gets scheduled cluster-wide
# anyway, so it's the one node where "the watchdog's own pod lands on the
# node that's failing" isn't a risk. Worker nodes are the ones more likely
# to go NotReady under memory/resource pressure — if the watchdog pod is
# co-scheduled onto whichever one of those is currently failing, it can't
# do its job during exactly the window it exists for (it would end up
# stuck `Terminating` alongside the workloads it's supposed to rescue,
# unable to run until that node recovers on its own).
#
# This is a soft preference (preferredDuringSchedulingIgnoredDuringExecution),
# not a hard requirement, so the watchdog still runs somewhere if this node
# is cordoned or otherwise unschedulable rather than getting stuck Pending.
preferredNode: node-01

# RBD pool used by MicroK8s PersistentVolumes.
cephPool: microk8s-rbd0

# Path on the host where MicroCeph stores its config and admin keyring.
microcephConfPath: /var/snap/microceph/current/conf

# How often the watchdog runs, in cron syntax. The default (every 2 minutes)
# is a reasonable balance between recovery speed and cluster overhead. Increase
# the interval (e.g. "*/5 * * * *") if the cluster is resource-constrained.
schedule: "*/2 * * * *"

image:
  ceph:
    repository: quay.io/ceph/ceph
    # Must match your MicroCeph version to ensure CLI compatibility.
    # Check on node with: snap info microceph | grep installed
    tag: v19.2.3
  kubectl:
    repository: bitnami/kubectl
    tag: "latest"
    # Bitnami no longer publishes versioned tags to Docker Hub. Digest pins the
    # exact image (currently 1.36.2) without relying on the floating "latest" tag.
    # To update: re-run the digest lookup and replace the value below.
    digest: "sha256:b9f4412e53f09d76b0991cdd29c0feff4c1d1e112b307e0ab155e5b050a9f4ec"
